<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sổ tay Toán 11 & Gia sư AI 📐</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                enableMenu: false 
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-wrapper">
        <!-- Nền mờ cho menu -->
        <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

        <!-- AI Modal Overlay -->
        <div id="ai-modal" class="modal-overlay" onclick="if(event.target === this) closeModal()">
            <div class="modal-content">
                <button class="modal-close" onclick="closeModal()">×</button>
                <h3 id="ai-modal-title" style="color: var(--accent-color); margin-bottom: 1rem; display: flex; align-items: center; gap: 8px;">✨ AI Giải thích</h3>
                <div id="ai-modal-body" class="math-content">
                    <!-- Nội dung AI sẽ đổ vào đây -->
                </div>
            </div>
        </div>

        <!-- API Key Settings Modal -->
        <div id="apikey-modal" class="modal-overlay" onclick="if(event.target === this) closeApiKeyModal()">
            <div class="modal-content" style="max-width: 420px;">
                <button class="modal-close" onclick="closeApiKeyModal()">×</button>
                <h3 style="color: var(--accent-color); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 8px;">🔑 Cài đặt Gemini API Key</h3>
                <p style="font-size: 0.9rem; color: #6b7280; margin-bottom: 1.25rem; line-height: 1.5;">
                    Nhập API Key để dùng tính năng AI. Key được lưu trên thiết bị của bạn, không gửi đi đâu.<br>
                    <a href="https://aistudio.google.com/apikey" target="_blank" style="color: var(--accent-color); font-weight: 600;">👉 Lấy key miễn phí tại đây</a>
                </p>
                <div style="display: flex; gap: 8px;">
                    <input id="apikey-input" type="password" placeholder="Dán API Key vào đây (AIza...)"
                        style="flex:1; padding: 10px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 0.95rem; font-family: inherit; outline: none; transition: border-color 0.2s;"
                        onfocus="this.style.borderColor='var(--accent-color)'" 
                        onblur="this.style.borderColor='#e5e7eb'"
                        onkeydown="if(event.key==='Enter') saveApiKey()">
                    <button onclick="saveApiKey()" class="primary-btn" style="flex-shrink:0;">Lưu</button>
                </div>
                <div id="apikey-status" style="margin-top: 0.75rem; font-size: 0.85rem; min-height: 20px;"></div>
            </div>
        </div>

        <header class="mobile-header">
            <div class="logo">📐 Toán 11 Chiu</div>
            <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </header>

        <aside id="sidebar">
            <div class="logo">
                <div class="logo-text">📐 Toán 11 Chiu</div>
                <button class="close-sidebar-btn" onclick="toggleSidebar()" title="Đóng menu">✕</button>
            </div>
            <ul id="chapter-list"></ul>
            <div class="resizer" id="dragMe" title="Kéo để thay đổi độ rộng"></div>
        </aside>

        <main id="content"></main>
    </div>

    <!-- Nút cài đặt API Key -->
    <button class="apikey-btn" onclick="openApiKeyModal()" title="Cài đặt API Key">🔑</button>

    <button class="mobile-preview-btn" onclick="toggleMobileMode()">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
        <span>Chế độ Điện thoại</span>
    </button>

    <script src="config.js"></script>
    <script src="script.js" defer></script>
</body>
</html>
